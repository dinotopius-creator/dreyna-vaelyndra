app = "vaelyndra-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[deploy]
  wait_timeout = "10m"

[env]
  VAELYNDRA_CORS_ORIGINS = "https://vaelyndra.com,https://www.vaelyndra.com,https://dist-tsbfgcct.devinapps.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[mounts]]
  source = "vaelyndra_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
