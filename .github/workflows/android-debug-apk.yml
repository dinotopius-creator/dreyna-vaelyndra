name: Build Android debug APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "vite.config.ts"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "tsconfig*.json"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - run: chmod +x ./gradlew
        working-directory: android
      - run: ./gradlew assembleDebug
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: vaelyndra-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
