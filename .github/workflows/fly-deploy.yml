name: Deploy backend to Fly

# Tout merge sur `main` qui touche `backend/` redéploie automatiquement
# l'app Fly `vaelyndra-api`. Avant ce workflow, il fallait lancer
# `fly deploy` à la main après chaque PR mergée — ce qui a causé des
# incidents concrets (ex. PR #74 où la migration d'emails seed n'a pas
# pris effet pendant plusieurs heures).
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app vaelyndra-api --wait-timeout 10m
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
