name: Sync ZEPETO stats

on:
  schedule:
    - cron: "0 */6 * * *"   # toutes les 6 heures
  workflow_dispatch:         # bouton manuel dans GitHub Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync script
        run: node scripts/sync-zepeto-stats.mjs

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain src/data/zepeto-stats.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/zepeto-stats.json
            git commit -m "chore(zepeto): sync stats automatique"
            git push
          else
            echo "Aucun changement dans zepeto-stats.json."
          fi
